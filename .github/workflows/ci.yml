name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true

      - name: Vet
        working-directory: app
        run: go vet ./...

      - name: Test
        working-directory: app
        run: go test -v ./...

      - name: Build
        working-directory: app
        run: go build ./...

      # Run golangci-lint via `go run` so it compiles with the workflow's Go 1.26
      # toolchain. The prebuilt golangci-lint-action binaries are built with an
      # older Go and refuse a `go 1.26` module ("linter built with older Go").
      - name: golangci-lint
        working-directory: app
        run: go run github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8 run ./...
