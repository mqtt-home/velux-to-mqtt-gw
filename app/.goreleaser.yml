project_name: velux-mqtt-gw
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: velux-mqtt-gw
    main: .
    binary: velux-mqtt-gw
    goos:
      - linux
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - "6"
      - "7"
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mqtt-home/velux-mqtt-gw/version.Version={{.Version}} -X github.com/mqtt-home/velux-mqtt-gw/version.GitCommit={{.Commit}} -X github.com/mqtt-home/velux-mqtt-gw/version.BuildTime={{.Date}}

dockers:
  - image_templates:
      - "mqtt-home/velux-mqtt-gw:{{ .Tag }}-amd64"
    dockerfile: Dockerfile.goreleaser
    use: buildx
    goos: linux
    goarch: amd64
    build_flag_templates:
      - "--platform=linux/amd64"
    skip_push: false

  - image_templates:
      - "mqtt-home/velux-mqtt-gw:{{ .Tag }}-arm64"
    dockerfile: Dockerfile.goreleaser
    use: buildx
    goos: linux
    goarch: arm64
    build_flag_templates:
      - "--platform=linux/arm64"
    skip_push: false

  - image_templates:
      - "mqtt-home/velux-mqtt-gw:{{ .Tag }}-armv6"
    dockerfile: Dockerfile.goreleaser-arm
    use: buildx
    goos: linux
    goarch: arm
    goarm: "6"
    build_flag_templates:
      - "--platform=linux/arm/v6"
    skip_push: false

  - image_templates:
      - "mqtt-home/velux-mqtt-gw:{{ .Tag }}-armv7"
    dockerfile: Dockerfile.goreleaser-arm
    use: buildx
    goos: linux
    goarch: arm
    goarm: "7"
    build_flag_templates:
      - "--platform=linux/arm/v7"
    skip_push: false

docker_manifests:
  - id: tag
    name_template: "mqtt-home/velux-mqtt-gw:{{ .Tag }}"
    image_templates:
      - mqtt-home/velux-mqtt-gw:{{ .Tag }}-amd64
      - mqtt-home/velux-mqtt-gw:{{ .Tag }}-arm64
      - mqtt-home/velux-mqtt-gw:{{ .Tag }}-armv6
      - mqtt-home/velux-mqtt-gw:{{ .Tag }}-armv7

  - id: latest
    name_template: "mqtt-home/velux-mqtt-gw:latest"
    image_templates:
      - mqtt-home/velux-mqtt-gw:{{ .Tag }}-amd64
      - mqtt-home/velux-mqtt-gw:{{ .Tag }}-arm64
      - mqtt-home/velux-mqtt-gw:{{ .Tag }}-armv6
      - mqtt-home/velux-mqtt-gw:{{ .Tag }}-armv7

release:
  disable: false
  mode: replace
  draft: false
  prerelease: auto
  make_latest: '{{ if .Prerelease }}false{{ else }}true{{ end }}'
  skip_upload: true
